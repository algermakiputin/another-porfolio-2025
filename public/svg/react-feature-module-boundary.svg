<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 370" font-family="-apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#334155"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="760" height="370" fill="#ffffff"/>
  <text x="380" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">A feature module exposes one public door</text>

  <!-- Rest of the app -->
  <rect x="40" y="178" width="150" height="64" rx="8" fill="#f8fafc" stroke="#475569" stroke-width="1.5"/>
  <text x="115" y="215" text-anchor="middle" font-size="13" fill="#0f172a">Rest of the app</text>

  <!-- arrow app -> index -->
  <line x1="192" y1="210" x2="278" y2="210" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Feature module box -->
  <rect x="250" y="90" width="470" height="250" rx="12" fill="#ffffff" stroke="#334155" stroke-width="1.5"/>
  <text x="262" y="112" font-size="13" font-style="italic" fill="#334155">features/transactions/</text>

  <!-- private region -->
  <rect x="392" y="120" width="312" height="205" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="6 5"/>
  <text x="548" y="315" text-anchor="middle" font-size="11" font-style="italic" fill="#64748b">private to the feature</text>

  <!-- internal boxes -->
  <rect x="408" y="138" width="132" height="58" rx="6" fill="#f1f5f9" stroke="#334155" stroke-width="1.5"/>
  <text x="474" y="172" text-anchor="middle" font-size="13" fill="#0f172a">components/</text>
  <rect x="556" y="138" width="132" height="58" rx="6" fill="#f1f5f9" stroke="#334155" stroke-width="1.5"/>
  <text x="622" y="172" text-anchor="middle" font-size="13" fill="#0f172a">hooks/</text>
  <rect x="408" y="214" width="132" height="58" rx="6" fill="#f1f5f9" stroke="#334155" stroke-width="1.5"/>
  <text x="474" y="248" text-anchor="middle" font-size="13" fill="#0f172a">services/</text>
  <rect x="556" y="214" width="132" height="58" rx="6" fill="#f1f5f9" stroke="#334155" stroke-width="1.5"/>
  <text x="622" y="248" text-anchor="middle" font-size="13" fill="#0f172a">types.ts</text>

  <!-- index.ts door -->
  <rect x="280" y="182" width="92" height="60" rx="8" fill="#eef2ff" stroke="#4338ca" stroke-width="1.5"/>
  <text x="326" y="208" text-anchor="middle" font-size="13" fill="#312e81">index.ts</text>
  <text x="326" y="226" text-anchor="middle" font-size="11" fill="#4338ca">public API</text>

  <!-- arrow index -> internals -->
  <line x1="372" y1="212" x2="392" y2="212" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>
</svg>
