<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 630" font-family="-apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#334155"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="760" height="630" fill="#ffffff"/>
  <text x="380" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">Hunter Vault — high-level architecture</text>

  <!-- On-device boundary -->
  <rect x="40" y="52" width="680" height="418" rx="12" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="6 5"/>
  <text x="58" y="76" font-size="12" font-style="italic" fill="#475569">Runs on device · web + iOS/Android (Capacitor)</text>

  <!-- Box A -->
  <rect x="170" y="92" width="400" height="56" rx="8" fill="#f1f5f9" stroke="#334155" stroke-width="1.5"/>
  <text x="370" y="125" text-anchor="middle" font-size="14" fill="#0f172a">React UI — feature modules (TypeScript)</text>

  <line x1="370" y1="148" x2="370" y2="188" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Box B -->
  <rect x="170" y="190" width="400" height="56" rx="8" fill="#f1f5f9" stroke="#334155" stroke-width="1.5"/>
  <text x="370" y="223" text-anchor="middle" font-size="14" fill="#0f172a">Feature hooks &amp; domain services</text>

  <!-- RevenueCat -->
  <rect x="592" y="190" width="112" height="56" rx="8" fill="#f8fafc" stroke="#475569" stroke-width="1.5"/>
  <text x="648" y="214" text-anchor="middle" font-size="12" fill="#0f172a">RevenueCat</text>
  <text x="648" y="230" text-anchor="middle" font-size="11" fill="#475569">subscriptions</text>
  <line x1="570" y1="218" x2="592" y2="218" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>

  <line x1="370" y1="246" x2="370" y2="286" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Box C -->
  <rect x="170" y="288" width="400" height="56" rx="8" fill="#f1f5f9" stroke="#334155" stroke-width="1.5"/>
  <text x="370" y="321" text-anchor="middle" font-size="14" fill="#0f172a">Dexie / IndexedDB — local-first data</text>

  <text x="58" y="452" font-size="12" font-style="italic" fill="#475569">Local-first: stays usable offline; the network is optional.</text>

  <!-- sync arrow (bidirectional) -->
  <line x1="370" y1="344" x2="370" y2="506" stroke="#334155" stroke-width="1.5" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  <rect x="388" y="411" width="152" height="22" fill="#ffffff"/>
  <text x="393" y="427" font-size="12" fill="#334155">Cloud synchronization</text>

  <!-- Cloud box -->
  <rect x="170" y="506" width="400" height="96" rx="12" fill="#ecfeff" stroke="#0e7490" stroke-width="1.5"/>
  <text x="188" y="528" font-size="12" font-style="italic" fill="#0e7490">Cloud</text>
  <rect x="192" y="536" width="356" height="50" rx="8" fill="#ffffff" stroke="#0e7490" stroke-width="1.5"/>
  <text x="370" y="566" text-anchor="middle" font-size="14" fill="#0f172a">Supabase / Firebase — sync, auth, analytics</text>
</svg>
