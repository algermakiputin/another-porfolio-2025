<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 315" font-family="-apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#334155"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="760" height="315" fill="#ffffff"/>
  <text x="380" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">The re-render debugging loop</text>

  <!-- Row 1 -->
  <rect x="40" y="80" width="210" height="56" rx="8" fill="#f1f5f9" stroke="#334155" stroke-width="1.5"/>
  <text x="145" y="104" text-anchor="middle" font-size="13" fill="#0f172a">Reproduce the</text>
  <text x="145" y="121" text-anchor="middle" font-size="13" fill="#0f172a">slow interaction</text>

  <rect x="290" y="80" width="210" height="56" rx="8" fill="#f1f5f9" stroke="#334155" stroke-width="1.5"/>
  <text x="395" y="104" text-anchor="middle" font-size="13" fill="#0f172a">Highlight updates</text>
  <text x="395" y="121" text-anchor="middle" font-size="12" fill="#475569">(see what flashes)</text>

  <rect x="540" y="80" width="210" height="56" rx="8" fill="#eef2ff" stroke="#4338ca" stroke-width="1.5"/>
  <text x="645" y="104" text-anchor="middle" font-size="13" fill="#312e81">Profile &amp; record</text>
  <text x="645" y="121" text-anchor="middle" font-size="13" fill="#312e81">why it rendered</text>

  <!-- Row 2 -->
  <rect x="540" y="230" width="210" height="56" rx="8" fill="#f1f5f9" stroke="#334155" stroke-width="1.5"/>
  <text x="645" y="254" text-anchor="middle" font-size="13" fill="#0f172a">Identify the cause</text>
  <text x="645" y="271" text-anchor="middle" font-size="12" fill="#475569">props · state · context</text>

  <rect x="290" y="230" width="210" height="56" rx="8" fill="#f1f5f9" stroke="#334155" stroke-width="1.5"/>
  <text x="395" y="254" text-anchor="middle" font-size="13" fill="#0f172a">Fix the narrowest</text>
  <text x="395" y="271" text-anchor="middle" font-size="13" fill="#0f172a">cause</text>

  <rect x="40" y="230" width="210" height="56" rx="8" fill="#eef2ff" stroke="#4338ca" stroke-width="1.5"/>
  <text x="145" y="263" text-anchor="middle" font-size="13" fill="#312e81">Re-measure</text>

  <!-- arrows -->
  <line x1="250" y1="108" x2="290" y2="108" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="500" y1="108" x2="540" y2="108" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="645" y1="136" x2="645" y2="230" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="540" y1="258" x2="500" y2="258" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="290" y1="258" x2="250" y2="258" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- loop back -->
  <line x1="145" y1="230" x2="145" y2="136" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="6 5" marker-end="url(#arrow)"/>
  <text x="155" y="186" font-size="11" fill="#64748b">if still slow, repeat</text>
</svg>
