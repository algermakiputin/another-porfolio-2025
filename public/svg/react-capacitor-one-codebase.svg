<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 420" font-family="-apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#334155"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="760" height="420" fill="#ffffff"/>
  <text x="380" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">One React codebase → web, iOS and Android</text>

  <!-- A: codebase -->
  <rect x="230" y="58" width="300" height="52" rx="8" fill="#eef2ff" stroke="#4338ca" stroke-width="1.5"/>
  <text x="380" y="90" text-anchor="middle" font-size="14" font-weight="700" fill="#312e81">One React + TypeScript codebase</text>
  <line x1="380" y1="110" x2="380" y2="150" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- B: web assets -->
  <rect x="270" y="150" width="220" height="50" rx="8" fill="#f1f5f9" stroke="#334155" stroke-width="1.5"/>
  <text x="380" y="180" text-anchor="middle" font-size="13" fill="#0f172a">Web assets (bundler build)</text>

  <!-- fan-out arrows -->
  <line x1="380" y1="200" x2="135" y2="298" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="380" y1="200" x2="380" y2="298" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="380" y1="200" x2="625" y2="298" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="248" y="244" text-anchor="middle" font-size="11" fill="#64748b">direct</text>
  <text x="512" y="244" text-anchor="middle" font-size="11" fill="#64748b">via Capacitor</text>

  <!-- targets -->
  <rect x="30" y="300" width="210" height="56" rx="8" fill="#f8fafc" stroke="#334155" stroke-width="1.5"/>
  <text x="135" y="324" text-anchor="middle" font-size="14" font-weight="700" fill="#0f172a">Web</text>
  <text x="135" y="344" text-anchor="middle" font-size="11" fill="#64748b">hosting / PWA</text>

  <rect x="275" y="300" width="210" height="56" rx="8" fill="#f8fafc" stroke="#334155" stroke-width="1.5"/>
  <text x="380" y="324" text-anchor="middle" font-size="14" font-weight="700" fill="#0f172a">iOS</text>
  <text x="380" y="344" text-anchor="middle" font-size="11" fill="#64748b">Xcode → App Store</text>

  <rect x="520" y="300" width="210" height="56" rx="8" fill="#f8fafc" stroke="#334155" stroke-width="1.5"/>
  <text x="625" y="324" text-anchor="middle" font-size="14" font-weight="700" fill="#0f172a">Android</text>
  <text x="625" y="344" text-anchor="middle" font-size="11" fill="#64748b">Studio → Google Play</text>

  <text x="380" y="398" text-anchor="middle" font-size="12" font-style="italic" fill="#64748b">Same UI and logic ship to all three; only the native shell and a few platform touches differ.</text>
</svg>
