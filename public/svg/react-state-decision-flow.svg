<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 630" font-family="-apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#334155"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="760" height="630" fill="#ffffff"/>
  <text x="380" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">Where should this piece of state live?</text>

  <!-- Q1 -->
  <rect x="40" y="64" width="300" height="56" rx="8" fill="#f1f5f9" stroke="#334155" stroke-width="1.5"/>
  <text x="190" y="97" text-anchor="middle" font-size="13" fill="#0f172a">Is it server data?</text>
  <rect x="430" y="64" width="290" height="56" rx="8" fill="#eef2ff" stroke="#4338ca" stroke-width="1.5"/>
  <text x="575" y="97" text-anchor="middle" font-size="13" fill="#312e81">Server-state layer (cache)</text>
  <line x1="340" y1="92" x2="430" y2="92" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="385" y="86" text-anchor="middle" font-size="11" fill="#475569">Yes</text>
  <line x1="190" y1="120" x2="190" y2="160" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="200" y="144" font-size="11" fill="#475569">No</text>

  <!-- Q2 -->
  <rect x="40" y="160" width="300" height="56" rx="8" fill="#f1f5f9" stroke="#334155" stroke-width="1.5"/>
  <text x="190" y="193" text-anchor="middle" font-size="13" fill="#0f172a">Does it belong in the URL?</text>
  <rect x="430" y="160" width="290" height="56" rx="8" fill="#eef2ff" stroke="#4338ca" stroke-width="1.5"/>
  <text x="575" y="193" text-anchor="middle" font-size="13" fill="#312e81">URL params (router)</text>
  <line x1="340" y1="188" x2="430" y2="188" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="385" y="182" text-anchor="middle" font-size="11" fill="#475569">Yes</text>
  <line x1="190" y1="216" x2="190" y2="256" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="200" y="240" font-size="11" fill="#475569">No</text>

  <!-- Q3 -->
  <rect x="40" y="256" width="300" height="56" rx="8" fill="#f1f5f9" stroke="#334155" stroke-width="1.5"/>
  <text x="190" y="289" text-anchor="middle" font-size="13" fill="#0f172a">Must it survive offline or reload?</text>
  <rect x="430" y="256" width="290" height="56" rx="8" fill="#eef2ff" stroke="#4338ca" stroke-width="1.5"/>
  <text x="575" y="289" text-anchor="middle" font-size="13" fill="#312e81">IndexedDB via Dexie</text>
  <line x1="340" y1="284" x2="430" y2="284" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="385" y="278" text-anchor="middle" font-size="11" fill="#475569">Yes</text>
  <line x1="190" y1="312" x2="190" y2="352" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="200" y="336" font-size="11" fill="#475569">No</text>

  <!-- Q4 -->
  <rect x="40" y="352" width="300" height="56" rx="8" fill="#f1f5f9" stroke="#334155" stroke-width="1.5"/>
  <text x="190" y="385" text-anchor="middle" font-size="13" fill="#0f172a">Is it form input being edited?</text>
  <rect x="430" y="352" width="290" height="56" rx="8" fill="#eef2ff" stroke="#4338ca" stroke-width="1.5"/>
  <text x="575" y="385" text-anchor="middle" font-size="13" fill="#312e81">Form state</text>
  <line x1="340" y1="380" x2="430" y2="380" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="385" y="374" text-anchor="middle" font-size="11" fill="#475569">Yes</text>
  <line x1="190" y1="408" x2="190" y2="448" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="200" y="432" font-size="11" fill="#475569">No</text>

  <!-- Q5 -->
  <rect x="40" y="448" width="300" height="56" rx="8" fill="#f1f5f9" stroke="#334155" stroke-width="1.5"/>
  <text x="190" y="481" text-anchor="middle" font-size="13" fill="#0f172a">Is it shared across features?</text>
  <rect x="430" y="448" width="290" height="56" rx="8" fill="#eef2ff" stroke="#4338ca" stroke-width="1.5"/>
  <text x="575" y="481" text-anchor="middle" font-size="13" fill="#312e81">Shared store or Context</text>
  <line x1="340" y1="476" x2="430" y2="476" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="385" y="470" text-anchor="middle" font-size="11" fill="#475569">Yes</text>
  <line x1="190" y1="504" x2="190" y2="544" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="200" y="528" font-size="11" fill="#475569">No</text>

  <!-- Default -->
  <rect x="40" y="544" width="300" height="56" rx="8" fill="#ecfeff" stroke="#0e7490" stroke-width="1.5"/>
  <text x="190" y="577" text-anchor="middle" font-size="13" fill="#0f172a">Local state — useState</text>
</svg>
